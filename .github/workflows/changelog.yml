name: Generate Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main 

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit and Push
        run: |
          # 1. Setup Bot Identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Explicitly checkout main to fix detached HEAD
          git checkout main
          
          # 3. Stage the changelog
          git add CHANGELOG.md
          
          # 4. Commit ONLY if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-update CHANGELOG for ${{ github.event.release.tag_name }}"
            git push origin main
          else
            echo "No changes to commit in CHANGELOG.md"
          fi