name: Generate Changelog

on:
  release:
    types: [published]

jobs:
  changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          CLIFF_VERSION=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-musl.tar.gz" | tar -xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate CHANGELOG.md
        run: git-cliff --config cliff.toml --output CHANGELOG.md

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: auto-update CHANGELOG for ${{ github.ref_name }}" || echo "No changes to commit"
          git push